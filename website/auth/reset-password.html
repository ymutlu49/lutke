<!DOCTYPE html>
<html lang="ku" dir="ltr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Şîfreya nû — LÛTKE</title>
  <meta name="robots" content="noindex">
  <meta name="theme-color" content="#1A7B6B">
  <link rel="icon" href="/assets/site/favicon.png" type="image/png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;500;600;700;800&display=swap">
  <link rel="stylesheet" href="{{CSS}}">
</head>
<body>
  <div class="auth-wrap">
    <div class="auth-card">
      <a class="brand" href="/" aria-label="LÛTKE"><img class="brand-mark" src="/assets/site/logo-128.png" alt="" width="44" height="44"><span class="brand-word">LÛTKE</span></a>

      <div id="form-wrap">
        <h1>Şîfreya nû binivîse</h1>
        <p>Ji bo hesabê xwe şîfreyeke nû saz bike.</p>
        <div id="msg" class="msg"></div>
        <form id="form" novalidate>
          <div class="field">
            <label for="pw1">Şîfreya nû</label>
            <input id="pw1" name="pw1" type="password" autocomplete="new-password" minlength="8" required placeholder="Herî kêm 8 tîp">
          </div>
          <div class="field">
            <label for="pw2">Şîfreyê dubare bike</label>
            <input id="pw2" name="pw2" type="password" autocomplete="new-password" minlength="8" required>
          </div>
          <button class="btn btn-primary btn-block btn-lg" type="submit" id="submit">Şîfreyê biguherîne</button>
        </form>
      </div>

      <div id="done" class="hide">
        <h1>Şîfre hat guhertin! ✓</h1>
        <div class="msg show ok">Niha tu dikarî bi şîfreya xwe ya nû têkevî.</div>
        <a class="btn btn-primary btn-block" href="/app/auth/login">Têkeve</a>
      </div>
    </div>
  </div>

  <script>
    (function () {
      'use strict';
      var qs = new URLSearchParams(location.search);
      var token = qs.get('token');
      var form = document.getElementById('form');
      var msg = document.getElementById('msg');
      var submit = document.getElementById('submit');
      var formWrap = document.getElementById('form-wrap');
      var done = document.getElementById('done');

      function err(text) { msg.textContent = text; msg.className = 'msg show err'; }

      if (!token) {
        form.classList.add('hide');
        err('Ev lînk ne rast e an ne temam e. Ji kerema xwe lînkê di e-nameyê de ji nû ve veke, an ji sepanê şîfreyeke nû bixwaze.');
      }

      form.addEventListener('submit', function (e) {
        e.preventDefault();
        var p1 = document.getElementById('pw1').value;
        var p2 = document.getElementById('pw2').value;
        if (p1.length < 8) { err('Şîfre divê herî kêm 8 tîp be.'); return; }
        if (p1 !== p2) { err('Herdu şîfre ne wek hev in.'); return; }

        submit.disabled = true; submit.textContent = 'Tê guhertin…';
        msg.className = 'msg';

        fetch('/api/auth/reset-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token: token, newPassword: p1 })
        }).then(function (r) {
          return r.json().then(function (data) { return { ok: r.ok, data: data }; });
        }).then(function (res) {
          if (res.ok && res.data && res.data.ok) {
            formWrap.classList.add('hide');
            done.classList.remove('hide');
          } else {
            submit.disabled = false; submit.textContent = 'Şîfreyê biguherîne';
            var code = res.data && res.data.code;
            var m = 'Tiştek çewt çû. Ji kerema xwe dîsa biceribîne.';
            if (code === 'invalid_token') m = 'Lînk nederbasdar e an dema wê qediyaye. Ji sepanê şîfreyeke nû bixwaze.';
            else if (code === 'weak_password') m = 'Şîfre divê herî kêm 8 tîp be.';
            else if (code === 'invalid_body') m = 'Agahî ne temam in.';
            err(m);
          }
        }).catch(function () {
          submit.disabled = false; submit.textContent = 'Şîfreyê biguherîne';
          err('Em nikarîn bigihîjin pêşkêşkerê. Girêdana înternetê kontrol bike.');
        });
      });
    })();
  </script>
</body>
</html>
