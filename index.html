<!DOCTYPE html>
<html>
<head>
  <base href="/lutke/">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <!-- WCAG 2.2 1.4.4 Resize Text: zoom'a izin ver (max 5x) -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
  <meta name="description" content="LÛTKE — Kurmancî dil öğretim uygulaması.">
  <meta name="theme-color" content="#1A7B6B">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="LÛTKE">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  <link rel="icon" type="image/png" href="favicon.png"/>
  <title>LÛTKE — Zimanê Kurdî</title>
  <link rel="manifest" href="manifest.json">
  <!-- WEB-COMPAT: google_fonts paketi runtime'da fonts.gstatic.com'dan Lexend /
       AtkinsonHyperlegible çeker (disleksi erişilebilirlik modu). Preconnect
       ile ilk font indirme gecikmesini ~100-200ms kısaltır.
       PERF 2026-04: preconnect ek olarak fonts.googleapis.com için de eklendi
       (CSS manifest'i oradan iniyor). dns-prefetch fallback as-is. -->
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
  <link rel="dns-prefetch" href="https://fonts.gstatic.com">
  <link rel="dns-prefetch" href="https://fonts.googleapis.com">
  <!-- PERF 2026-04: canvaskit.js/wasm bulunduğu aynı origin'de, modern
       tarayıcıda http/2 pipeline yeterli. canvaskit'i preload etmek ilk
       paint'i öne çeker ama 9.7MB main.dart.js zaten daha büyük —
       canvaskit preload'ı kullanıcı paketiyle (tarayıcı auto) yarıştırmak
       isteniyorsa ekleyebilirsin. Şimdilik kapalı. -->
  <!-- <link rel="preload" href="canvaskit/canvaskit.wasm" as="fetch" crossorigin> -->
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: linear-gradient(180deg, #1A7B6B 0%, #0A3D35 100%);
      /* WEB-COMPAT: iOS Safari'de 100vh address bar'ı dahil eder →
         boot splash ekranın alt kısmına taşar. dvh (dynamic viewport) fallback
         ile vh. Desktop/Android'de dvh = vh, iOS Safari'de daralır/genişler. */
      height: 100vh;
      height: 100dvh;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      color: #fff;
      /* WEB-COMPAT: iOS dokunma vurgusunu kapat — Flutter kendi ripple'ı var. */
      -webkit-tap-highlight-color: transparent;
      -webkit-touch-callout: none;
      -webkit-text-size-adjust: 100%;
    }
    /* UX FIX #1: Loading splash — kullanıcı 9.6MB'lik indirmede boş ekran görmesin.
       Flutter mount olduğunda bu div otomatik kapanır (flutter_bootstrap boş hale
       getirince gizlenir). "Installing..." yerine doğru kültürel dilde slogan. */
    #lutke-boot {
      position: fixed; inset: 0;
      /* WEB-COMPAT: dvh fallback — iOS Safari address bar dahil edilmesin. */
      height: 100vh;
      height: 100dvh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 22px;
      opacity: 1;
      transition: opacity 600ms ease;
      z-index: 9999;
      padding: 24px;
      text-align: center;
    }
    #lutke-boot.fade-out { opacity: 0; pointer-events: none; }
    .boot-logo {
      width: 96px; height: 96px;
      border-radius: 50%;
      background: #fff;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 24px rgba(0,0,0,.25);
      animation: pulse 1.6s ease-in-out infinite;
    }
    .boot-logo img { width: 72%; height: 72%; object-fit: contain; }
    .boot-title {
      font-size: 28px; font-weight: 900;
      letter-spacing: 2px;
    }
    .boot-sub {
      font-size: 13px; opacity: .75;
      max-width: 280px; line-height: 1.5;
    }
    .boot-progress {
      width: 220px; height: 4px;
      background: rgba(255,255,255,.15);
      border-radius: 4px; overflow: hidden;
    }
    .boot-bar {
      width: 40%; height: 100%;
      background: #fff;
      border-radius: 4px;
      animation: slide 1.4s ease-in-out infinite;
    }
    .boot-hint {
      font-size: 11px; opacity: .55;
      margin-top: 8px;
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.06); }
    }
    @keyframes slide {
      0% { transform: translateX(-100%); }
      100% { transform: translateX(350%); }
    }
  </style>
</head>
<body>
  <div id="lutke-boot" role="status" aria-live="polite" aria-label="LÛTKE tê barkirin">
    <div class="boot-logo">
      <img src="icons/Icon-192.png" alt="" aria-hidden="true"/>
    </div>
    <div>
      <div class="boot-title">LÛTKE</div>
      <div class="boot-sub" style="margin-top:6px">Zimanê Kurdî tê amadekirin…<br/><span style="opacity:.7">Kerem bike bisekine</span></div>
    </div>
    <div class="boot-progress"><div class="boot-bar"></div></div>
    <div class="boot-hint" id="boot-slow-hint" style="display:none">
      Girêdana înternetê qels e? Kerem bike bisekine.<br/>
      <span style="opacity:.7">Dibe ku girêdan hêdî be.</span>
    </div>
  </div>
  <script>
    // UX FIX #1b: Yavaş bağlantıda (>5sn) kullanıcıya ekstra context ver —
    // "donduğunu sanmasın". 12sn sonra da hâlâ orada ise daha güçlü mesaj.
    setTimeout(function(){
      var h = document.getElementById('boot-slow-hint');
      if (h) h.style.display = 'block';
    }, 5000);
    // Flutter mount olunca boot ekranı fade-out yapar.
    window.addEventListener('flutter-first-frame', function() {
      var el = document.getElementById('lutke-boot');
      if (!el) return;
      el.classList.add('fade-out');
      setTimeout(function(){ if (el && el.parentNode) el.parentNode.removeChild(el); }, 700);
    });
    // WEB-COMPAT: Service worker güncellemeyi yakala — kullanıcı eski
    // cache'te kilitli kalmasın. Yeni SW "installed" olduğunda (waiting
    // phase) skipWaiting() + reload() ile yeni sürüme geç. GitHub Pages
    // deploy'larından sonra kullanıcılar otomatik güncellenir.
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.addEventListener('controllerchange', function() {
        // İlk yüklemede controllerchange tetiklenmez; sadece SW değiştiğinde.
        // Sessizce reload (kullanıcı aktifken rahatsız etmesin — yine de
        // güvenli çünkü Flutter state persist ediyor).
        if (window._lutkeReloading) return;
        window._lutkeReloading = true;
        window.location.reload();
      });
    }
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
