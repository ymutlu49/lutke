<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="description" content="LÛTKE — Kurmancî dil öğretim uygulaması. Kurdish Language Learning App.">
  <meta name="theme-color" content="#1A7B6B">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="LÛTKE">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>LÛTKE — Zimanê Kurdî</title>
  <link rel="manifest" href="manifest.json">

  <style>
    body {
      margin: 0;
      padding: 0;
      background: linear-gradient(135deg, #1A7B6B 0%, #0F5C50 100%);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      overflow: hidden;
      height: 100vh;
    }

    /* Flutter loading screen */
    #loading {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 999;
      transition: opacity 0.4s ease;
    }

    #loading.fade-out {
      opacity: 0;
      pointer-events: none;
    }

    #loading img {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      background: white;
      padding: 16px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.15);
      animation: pulse 2s ease-in-out infinite;
    }

    #loading h1 {
      color: white;
      font-size: 32px;
      font-weight: 900;
      letter-spacing: 6px;
      margin-top: 24px;
      margin-bottom: 4px;
    }

    #loading p {
      color: rgba(255,255,255,0.7);
      font-size: 15px;
      letter-spacing: 2px;
      margin: 0;
    }

    #loading .spinner {
      width: 28px;
      height: 28px;
      border: 2.5px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      margin-top: 48px;
      animation: spin 0.8s linear infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <!-- Loading screen — Flutter yüklenene kadar gösterilir -->
  <div id="loading">
    <img src="icons/Icon-512.png" alt="LÛTKE">
    <h1>LÛTKE</h1>
    <p>Zimanê Kurdî</p>
    <div class="spinner"></div>
  </div>

  <script src="flutter_bootstrap.js" async></script>
  <script>
    // Flutter yüklendikten sonra loading ekranını kaldır
    window.addEventListener('flutter-first-frame', function() {
      var loading = document.getElementById('loading');
      if (loading) {
        loading.classList.add('fade-out');
        setTimeout(function() { loading.remove(); }, 500);
      }
    });
  </script>
</body>
</html>
