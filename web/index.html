<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="description" content="LÛTKE — Kurmancî dil öğretim uygulaması.">
  <meta name="theme-color" content="#1A7B6B">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="LÛTKE">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  <link rel="icon" type="image/png" href="favicon.png"/>
  <title>LÛTKE — Zimanê Kurdî</title>
  <link rel="manifest" href="manifest.json">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: linear-gradient(160deg, #1A7B6B 0%, #0F5C50 50%, #0A3D35 100%);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif;
      height: 100vh;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }
    #loading {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 999;
      opacity: 1;
      transition: opacity 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    }
    #loading.done { opacity: 0; pointer-events: none; }

    .logo-wrap {
      width: clamp(80px, 22vw, 130px);
      height: clamp(80px, 22vw, 130px);
      background: white;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10), 0 1px 4px rgba(0,0,0,0.06);
      padding: clamp(12px, 3vw, 20px);
      animation: logoIn 0.7s cubic-bezier(0.16, 1, 0.3, 1) both;
    }
    .logo-wrap img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .brand {
      margin-top: clamp(16px, 4vw, 28px);
      text-align: center;
      animation: fadeUp 0.6s 0.3s cubic-bezier(0.16, 1, 0.3, 1) both;
    }
    .brand h1 {
      font-size: clamp(24px, 6vw, 36px);
      font-weight: 900;
      color: white;
      letter-spacing: 0.15em;
      line-height: 1;
    }
    .brand p {
      font-size: clamp(12px, 2.5vw, 15px);
      color: rgba(255,255,255,0.6);
      letter-spacing: 0.08em;
      margin-top: 6px;
      font-weight: 400;
    }

    .loader {
      margin-top: clamp(40px, 10vw, 64px);
      width: 24px;
      height: 24px;
      border: 2px solid rgba(255,255,255,0.2);
      border-top-color: rgba(255,255,255,0.8);
      border-radius: 50%;
      animation: spin 0.7s linear infinite, fadeUp 0.4s 0.6s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    @keyframes logoIn {
      from { opacity: 0; transform: scale(0.85); }
      to { opacity: 1; transform: scale(1); }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="loading">
    <div class="logo-wrap">
      <img src="icons/Icon-512.png" alt="LÛTKE">
    </div>
    <div class="brand">
      <h1>LÛTKE</h1>
      <p>Zimanê Kurdî</p>
    </div>
    <div class="loader"></div>
  </div>
  <script src="flutter_bootstrap.js" async></script>
  <script>
    window.addEventListener('flutter-first-frame', function() {
      var el = document.getElementById('loading');
      if (el) { el.classList.add('done'); setTimeout(function() { el.remove(); }, 600); }
    });
  </script>
</body>
</html>
