name: lutke
description: LÛTKE — Zimanê Kurdî. Kurmancî dil öğretim uygulaması.
publish_to: none
version: 1.0.0+1

environment:
  sdk: ">=3.6.0 <4.0.0"
  flutter: ">=3.27.0"

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^14.6.3

  # Local Database (offline-first)
  drift: ^2.20.0
  sqlite3_flutter_libs: ^0.5.24
  path_provider: ^2.1.4
  path: ^1.9.0

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  firebase_storage: ^12.3.3

  # Audio
  just_audio: ^0.9.41
  record: ^5.1.2

  # Animations
  flutter_animate: ^4.5.0
  lottie: ^3.1.3

  # Fonts & Localization
  google_fonts: ^6.2.1
  easy_localization: ^3.0.7

  # Notifications
  flutter_local_notifications: ^18.0.1

  # Permissions
  permission_handler: ^11.3.1

  # Network & Connectivity
  connectivity_plus: ^6.0.5
  dio: ^5.7.0

  # Utils
  shared_preferences: ^2.3.3
  uuid: ^4.5.1
  intl: ^0.19.0
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  share_plus: ^10.0.2

  # FSRS — Spaced Repetition
  # Not: pub.dev'de fsrs veya dart_fsrs araması yapılmalı.
  # Alternatif: fsrs algoritmasını core/utils/fsrs_algorithm.dart'a elle implemente edeceğiz.

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.13
  drift_dev: ^2.20.0
  riverpod_generator: ^2.6.1
  custom_lint: ^0.7.0
  riverpod_lint: ^2.6.1
  mockito: ^5.4.4

flutter:
  uses-material-design: true

  assets:
    - assets/audio/
    - assets/images/
    - assets/animations/
    - assets/translations/

  fonts:
    - family: NotoSans
      fonts:
        - asset: assets/fonts/NotoSans-Regular.ttf
          weight: 400
        - asset: assets/fonts/NotoSans-Medium.ttf
          weight: 500
        - asset: assets/fonts/NotoSans-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/NotoSans-Bold.ttf
          weight: 700
